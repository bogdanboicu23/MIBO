name: Deploy API Gateway
permissions:
  contents: read
  pull-requests: write
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/MIBO.ApiGateway/**'
      - 'deploy/helm/api-gateway/**'
      - 'deploy/environments/**/values-api-gateway.yaml'
      - '.github/workflows/deploy-api-gateway.yml'
  push:
    branches: [main]
    paths:
      - 'src/MIBO.ApiGateway/**'
      - 'deploy/helm/api-gateway/**'
      - 'deploy/environments/**/values-api-gateway.yaml'
      - '.github/workflows/deploy-api-gateway.yml'
  workflow_dispatch:

concurrency:
  group: api-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.digitalocean.com
  DO_REGISTRY_NAME: mibo
  CLUSTER_NAME: mibo
  NAMESPACE: test
  SERVICE_NAME: api-gateway

jobs:
  test:
    uses: ./.github/workflows/tests.yml
    permissions:
      contents: read

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tags.outputs.TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: doctl registry login --expiry-seconds 1200

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TAG=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "PUSH=false" >> $GITHUB_OUTPUT
          else
            echo "TAG=test-${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
            echo "PUSH=true" >> $GITHUB_OUTPUT
          fi

      - name: Build (PR) or Build & Push (main)
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.DO_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}:${{ steps.tags.outputs.TAG }}"

          if [[ "${{ steps.tags.outputs.PUSH }}" == "true" ]]; then
            docker buildx build --platform linux/amd64 \
              -t "${IMAGE}" \
              -t "${{ env.REGISTRY }}/${{ env.DO_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}:test-latest" \
              --push \
              -f ./src/MIBO.ApiGateway/Dockerfile \
              ./src
          else
            docker buildx build --platform linux/amd64 \
              -t "${IMAGE}" \
              --load \
              -f ./src/MIBO.ApiGateway/Dockerfile \
              ./src
          fi

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Create test namespace if not exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry do-registry-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} \
            --docker-password=${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create api-gateway secrets
        run: |
          JWT_KEY="$(kubectl get secret identity-secrets -n ${{ env.NAMESPACE }} -o jsonpath='{.data.jwt-key}' | base64 --decode)"
          kubectl create secret generic api-gateway-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=Jwt__Key="${JWT_KEY}" \
            --from-literal=Jwt__Issuer='MIBO.IdentityService' \
            --from-literal=Jwt__Audience='MIBO.Services' \
            --from-literal=IdentityService__Authority='http://identity-service:8080' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.SERVICE_NAME }} deploy/helm/${{ env.SERVICE_NAME }} \
            --namespace ${{ env.NAMESPACE }} \
            --history-max 5 \
            --values deploy/environments/test/values-${{ env.SERVICE_NAME }}.yaml \
            --set-string image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.DO_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --timeout=300s || true

      - name: Get deployment status
        if: always()
        run: |
          echo "=== Deployment status ==="
          kubectl get deployment/${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }}
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.SERVICE_NAME }}
          echo "=== Services ==="
          kubectl get services -n ${{ env.NAMESPACE }} -l app=${{ env.SERVICE_NAME }}
