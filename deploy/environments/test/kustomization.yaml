apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

resources:
  - ../../base

helmCharts:
  - name: api-gateway
    repo: file://../../helm
    valuesFile: values-api-gateway.yaml
    namespace: test
  - name: conversation-service
    repo: file://../../helm
    valuesFile: values-conversation-service.yaml
    namespace: test
  - name: action-service
    repo: file://../../helm
    valuesFile: values-action-service.yaml
    namespace: test
  - name: langchain-service
    repo: file://../../helm
    valuesFile: values-langchain-service.yaml
    namespace: test
  - name: identity-service
    repo: file://../../helm
    valuesFile: values-identity-service.yaml
    namespace: test
