image:
  repository: registry.digitalocean.com/mibo/langchain-service
  tag: staging
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

secrets:
  name: langchain-service-secrets

env:
  ACTION_SERVICE_URL: http://action-service:8080
  CONTEXT_CONFIG_DIR: /app/config

probes:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
