image:
  repository: registry.digitalocean.com/mibo/conversation-service
  tag: staging
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

secrets:
  name: conversation-service-secrets

env:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Production"
  AGENT_SERVICE_URL: "http://langchain-service:8088"
  ACTION_SERVICE_URL: "http://action-service:8080"
  Planner__BaseUrl: "http://langchain-service:8088"

ingress:
  enabled: false
