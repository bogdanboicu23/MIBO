image:
  repository: registry.digitalocean.com/mibo/action-service
  tag: staging
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

env:
  ASPNETCORE_URLS: http://+:8080
  ASPNETCORE_ENVIRONMENT: Production
  DUMMYJSON_BASE_URL: https://dummyjson.com
  BANKSERVICE_BASE_URL: https://financial.mibo.monster
  RetryPolicy__MigratedServices__0: OpenWeatherMap
  RetryPolicy__MigratedServices__1: DummyJson
  RetryPolicy__MigratedServices__2: Spotify
  RetryPolicy__MigratedServices__3: BankService
  RetryPolicy__MigratedServices__4: NewsApi
  ConnectionStrings__Redis: "redis.test.svc.cluster.local:6379,abortConnect=false"

secretEnv:
  - name: Spotify__ClientId
    valueFrom:
      secretKeyRef:
        name: spotify-secrets
        key: client-id
  - name: Spotify__ClientSecret
    valueFrom:
      secretKeyRef:
        name: spotify-secrets
        key: client-secret
