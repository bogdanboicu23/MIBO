apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: mibo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: api-gateway
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        image: registry.digitalocean.com/registry-mibo/api-gateway:latest
        imagePullSecrets:
        - name: registry-mibo
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Development
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: mibo
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer


---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: mibo
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: test
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8080

  egress:
    - to:
       - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: test
       - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability