replicaCount: 1

image:
  repository: registry.digitalocean.com/mibo/langchain-service
  tag: test-latest
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

service:
  type: ClusterIP
  port: 8088

secrets:
  name: langchain-service-secrets

probes:
  path: /langchain/healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false