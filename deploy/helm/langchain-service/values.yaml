replicaCount: 1

image:
  repository: registry.digitalocean.com/mibo/langchain-service
  tag: test-latest
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

service:
  type: ClusterIP
  port: 8088

env:
  ACTION_SERVICE_URL: http://action-service:8080
  CONTEXT_CONFIG_DIR: /app/config

secrets:
  name: langchain-service-secrets

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
