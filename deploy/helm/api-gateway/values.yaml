replicaCount: 1

image:
  repository: registry.digitalocean.com/mibo/api-gateway
  tag: test-latest
  pullPolicy: Always

imagePullSecrets:
  - name: do-registry-secret

service:
  type: ClusterIP
  port: 8080

secrets:
  name: api-gateway-secrets

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: api-gateway.dev.mibo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env:
  ASPNETCORE_ENVIRONMENT: test
  ASPNETCORE_URLS: http://+:8080
