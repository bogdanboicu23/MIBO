name: mibo-planner

networks:
  planner_net:
    driver: bridge

services:
  langchain-planner:
    container_name: mibo-langchain-planner
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      CONTEXT_CONFIG_DIR: /app/config
      ENABLE_DEEP_REASONING: ${ENABLE_DEEP_REASONING:-true}
      DEEP_SEARCH_MAX_TOOLS: ${DEEP_SEARCH_MAX_TOOLS:-12}
      DEEP_SEARCH_MAX_COMPONENTS: ${DEEP_SEARCH_MAX_COMPONENTS:-8}
      DEEP_SEARCH_MAX_ACTION_ROUTES: ${DEEP_SEARCH_MAX_ACTION_ROUTES:-8}

    ports:
      - "8088:8088"

    networks:
      - planner_net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/langchain/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
