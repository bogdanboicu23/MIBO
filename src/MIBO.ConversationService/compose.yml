name: mibo-local

networks:
  mibo:
    driver: bridge

volumes:
  redis_data:

services:
  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: mibo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mibo

#  
